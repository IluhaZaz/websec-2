services:
  backend:
    image: backend
    restart: unless-stopped
    pull_policy: never
    build:
      context: ..
      dockerfile: .docker/DockerfileBackend
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--reload"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ../backend:/app/backend

  frontend:
    image: frontend
    restart: unless-stopped
    pull_policy: never
    build:
      context: ..
      dockerfile: .docker/DockerfileFrontend
    command: [ "uvicorn", "frontend.main:app", "--host", "0.0.0.0", "--reload" ]
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ../frontend:/app/frontend
    depends_on:
      backend:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: schedule-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    env_file:
      - .env
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  redis_data: